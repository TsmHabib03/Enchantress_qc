<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nail Salon Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/css/styles.css" rel="stylesheet" />
  </head>
  <body class="booking-bg">
    <main class="container py-4">
      <section class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <h1 class="h3 mb-2">Book an Appointment</h1>
          <p class="text-muted mb-0">Pick a service and preferred time. We will confirm instantly.</p>
        </div>
      </section>

      <section class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <form id="booking-form" class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="fullName">Full name</label>
              <input class="form-control" id="fullName" name="fullName" required />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="phone">Phone</label>
              <input class="form-control" id="phone" name="phone" required />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="serviceId">Service</label>
              <select class="form-select" id="serviceId" name="serviceId" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="date">Date</label>
              <input class="form-control" type="date" id="date" name="date" required />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="startTime">Start time</label>
              <input class="form-control" type="time" id="startTime" name="startTime" required />
            </div>
            <div class="col-12">
              <button class="btn btn-primary" type="submit">Confirm Booking</button>
            </div>
          </form>
        </div>
      </section>

      <section class="card shadow-sm border-0">
        <div class="card-body">
          <h2 class="h5">Available Slots</h2>
          <ul id="slot-list" class="list-group list-group-flush"></ul>
        </div>
      </section>

      <div id="toast" class="alert mt-3 d-none" role="alert"></div>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/pages/booking.js"></script>
  </body>
</html>
